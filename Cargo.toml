[package]
name = "liblumina"
version = "0.1.0"
edition = "2021"
authors = [
  "Chris Cochrun <chris@cochrun.xyz>"
]
license = "GPL-3.0"

# This will instruct Cargo to create a static
# library which CMake can link against
[lib]
crate-type = ["staticlib"]
path = "src/rust/lib.rs"

[dependencies]
configparser = "3.0.2"
serde = "1.0.152"
serde_derive = "1.0.152"
quote = "1.0.27"
cxx = "1.0.83"
cxx-qt = "0.6.0"
cxx-qt-lib = "0.6.0"
# home = "0.5.4"
dirs = "5.0.0"
diesel = { version = "2.0.3", features = ["sqlite"] }
# libsqlite3-sys = { version = ">=0.17.2", features = ["bundled"] }
youtube_dl = "0.8.0"
diesel_migrations = { version = "2.1.0", features = ["sqlite"] }
tar = "0.4.40"
zstd = "0.12.4"
serde_json = "1.0.104"
fastrand = "2.0.0"
rfd = { version = "0.12.1", features = ["xdg-portal"], default-features = false }
sqlx = { version = "0.7", features = ["sqlite", "runtime-tokio"] }
tokio = { version = "1.32.0", features = ["full"] }
tracing-subscriber = { version = "0.3.17", features = ["fmt", "std", "time", "local-time", "env-filter"] }
tracing = "0.1.37"
time = { version = "0.3.29", features = ["formatting", "macros"] }
obws = "0.11.5"
reqwest = "0.11.23"
# ffmpeg-next = "6.0.0"

# cxx-qt-build generates C++ code from the `#[cxx_qt::bridge]` module
# and compiles it together with the Rust static library
[build-dependencies]
cxx-qt-build = "0.6.0"
qt-build-utils = "0.6.0"

# [dependencies.confy]
# features = ["yaml_conf"]
# default-features = false
