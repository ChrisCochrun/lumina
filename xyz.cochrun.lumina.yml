app-id: xyz.cochrun.lumina
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm22
base: com.system76.Cosmic.BaseApp
command: lumina -i
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=xdg-documents
  - --filesystem=xdg-config/cosmic:rw
  - --filesystem=xdg-data/lumina:rw
  - --filesystem=xdg-cache/lumina:rw
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm22/bin
  # append-path: /usr/lib/sdk/llvm22/bin
  prepend-ld-library-path: /usr/lib/sdk/llvm22/lib
  env:
    CARGO_HOME: /run/build/lumina/cargo
    LIBCLANG_PATH: /usr/lib/sdk/llvm22/lib
    BINDGEN_EXTRA_CLANG_ARGS: -I/usr/lib/sdk/llvm22/lib/clang/22/include
    PKG_CONFIG_PATH: /app/lib64/pkgconfig:/app/lib/pkgconfig:/app/share/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig
    DATABASE_URL: sqlite://./test.db
    # CC: gcc
    # CXX: g++
    # CARGO_NET_OFFLINE: 'true'
modules:
  # - name: mupdf-rs
  #   buildsystem: simple
  #   build-commands:
  #     - cargo build --offline --release
  #   sources:
  #     - type: git
  #       url: https://github.com/messense/mupdf-rs.git
  #       commit: 902d44bf7becfc84f8349c524cb8acfb18a6f3d4
  #     - mupdf-cargo-sources.json

  - name: lumina
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-nightly/bin
      env:
        CARGO_HOME: /run/build/lumina/cargo
        # CARGO_NET_OFFLINE: 'true'
    build-commands:
      - just build-offline
      # - cargo build --release

      - install -Dm0755 target/release/lumina /app/bin/lumina
      - install -Dm0644 res/xyz.cochrun.lumina.desktop /app/share/applications/xyz.cochrun.lumina.desktop
      - install -Dm0644 res/xyz.cochrun.lumina.metainfo.xml /app/share/appdata/xyz.cochrun.lumina.metainfo.xml
      - install -Dm0644 res/icons/app.svg /app/share/icons/hicolor/scalable/apps/lumina.svg

    sources:
      # - type: git
      #   url: https://git.tfcconnection.org/chris/lumina.git
      #   commit: 53d1ad6163634658a274293d3a2ca7a69a4d9421

      - type: dir
        path: .

      - cargo-sources.json
